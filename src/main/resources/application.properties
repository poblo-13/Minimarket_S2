spring.application.name=minimarket

# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# La consola H2 es una superficie de ataque (acceso directo a la BD), por eso
# queda DESHABILITADA por defecto. Para desarrollo se reactiva con el perfil dev
# (ver application-dev.properties): -Dspring-boot.run.profiles=dev
spring.h2.console.enabled=false

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# La siembra de datos la hace DataSeeder.java, no el data.sql -> lo deshabilitamos
spring.sql.init.mode=never

# carga el .env si existe (las claves no van versionadas)
spring.config.import=optional:file:.env[.properties]

# JWT: lo ideal es que salga del .env. El valor tras los : es solo un fallback de dev
jwt.secret=${JWT_SECRET:claveDeDesarrolloCambiarPorLaDel_env_minimo32caracteres}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Contraseñas iniciales del seeder (vienen del .env; el valor tras : es fallback de dev)
seed.admin.password=${SEED_ADMIN_PASSWORD:12345}
seed.empleado.password=${SEED_EMPLEADO_PASSWORD:12345}
seed.cliente.password=${SEED_CLIENTE_PASSWORD:12345}

# Monitoreo de actividades sospechosas: el logger dedicado SECURITY_AUDIT
# registra a nivel WARN logins fallidos, tokens invalidos y accesos denegados (403)
logging.level.SECURITY_AUDIT=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{0} - %msg%n