spring.application.name=minimarket

# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

#Esperar a que se creen las tablas antes de insertar los datos
spring.jpa.defer-datasource-initialization=true

# carga el .env si existe (las claves no van versionadas)
spring.config.import=optional:file:.env[.properties]

# JWT: lo ideal es que salga del .env. El valor tras los : es solo un fallback de dev
jwt.secret=${JWT_SECRET:claveDeDesarrolloCambiarPorLaDel_env_minimo32caracteres}
jwt.expiration=${JWT_EXPIRATION:3600000}