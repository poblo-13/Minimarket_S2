# Perfil de DESARROLLO unicamente. Activar con:
#   -Dspring-boot.run.profiles=dev   (o SPRING_PROFILES_ACTIVE=dev)
# Reactiva la consola H2 (deshabilitada por seguridad en el perfil por defecto).
# NUNCA usar este perfil en produccion: la consola H2 expone la base de datos.
spring.h2.console.enabled=true
